[services.communication-control]
dockerfilePath = "src/CommunicationControl/DevOpsProject/Dockerfile.full"

[services.communication-control.scaling]
enabled = true
minInstances = 1
maxInstances = 3

  [services.communication-control.scaling.triggers]
  cpuPercent   = 70   # scale up при > 70% CPU
  memoryPercent = 80   # scale up при > 80% RAM

[services.hivemind]
dockerfilePath = "src/CommunicationControl/DevOpsProject.HiveMind.API/Dockerfile.full"

[services.hivemind.scaling]
enabled = true
minInstances = 1
maxInstances = 5   # HiveMind може масштабуватись агресивніше

  [services.hivemind.scaling.triggers]
  cpuPercent   = 60

[services.map-client]
source = "src/MapClient"

[services.map-client.scaling]
enabled = true
minInstances = 1
maxInstances = 2
