syntax = "proto3";

option csharp_namespace = "DevOpsProject.Shared.Grpc";
import "google/protobuf/timestamp.proto";

package shared;

import "location.proto";

message DroneTelemetry
{
  string droneId = 1;
  Location location = 2;
  float speed = 3;
  float height = 4;
  DroneType type = 5;
  google.protobuf.Timestamp timestamp = 6;
  DroneState state = 7;
}

enum DroneState
{
  DroneState_None = 0;
  DroneState_Stop = 1;
  DroneState_Move = 2;
}

enum DroneType
{
  DroneType_Undefined = 0;
  DroneType_Scout = 1;
  DroneType_Striker = 2;
  DroneType_Relay = 3;
}
